name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via SSH Git Pull
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          # On augmente le timeout au cas où le réseau Infomaniak soit lent
          command_timeout: 10m
          script: |
            cd /srv/customer/sites/liturgicielauri.moustik.site
            
            # On configure Git pour éviter les messages d'avertissement inutiles
            git config --global core.quotepath false
            
            if [ ! -d ".git" ]; then
              echo "Nettoyage et clonage tout neuf..."
              # On vide tout y compris les fichiers cachés, sauf . (lui-même) et .. (parent)
              find . -maxdepth 1 ! -name "." ! -name ".." -exec rm -rf {} +
              # Le secret est ici : --quiet pour éviter l'erreur 141
              git clone --quiet https://github.com/sebschopf/liturgicielauri-pages.git .
            else
              echo "Mise à jour légère..."
              git fetch --quiet origin main
              git reset --hard --quiet origin/main
            fi
            
            # On installe sans bavardage
            npm install --omit=dev --no-audit --no-fund --quiet
            
            touch index.js
            echo "Succès !"
            # On force une sortie propre pour éviter le signal 141
            exit 0
