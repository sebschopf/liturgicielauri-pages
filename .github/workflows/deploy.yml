name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH Git Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          # On se connecte et on exécute les commandes directement sur le serveur
          script: |
            cd /srv/customer/sites/liturgicielauri.moustik.site
            
            # 1. On nettoie tout sauf le dossier .git s'il existe
            # Si ce n'est pas un dépôt git, on vide tout pour cloner proprement
            if [ ! -d ".git" ]; then
              echo "Initialisation du dépôt..."
              rm -rf *
              git clone https://github.com/sebschopf/liturgicielauri-pages.git .
            else
              echo "Mise à jour du dépôt existant..."
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # 2. Installation et Redémarrage
            npm install --omit=dev
            touch index.js
            
            echo "Déploiement terminé !"
